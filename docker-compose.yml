services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landlord
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: landlordminio
      MINIO_ROOT_PASSWORD: landlordminiochange
    volumes:
      - miniodata:/data

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/landlord
      PORT: '3000'
      # JSON array of browser origins for CORS (match how you open the web UI).
      CORS_ORIGIN: '["http://localhost:5174"]'
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: landlordminio
      S3_SECRET_KEY: landlordminiochange
      S3_BUCKET: landlord-uploads
      S3_FORCE_PATH_STYLE: 'true'
    depends_on:
      - postgres
      - minio

  web:
    build: .
    restart: unless-stopped
    ports:
      - '5174:80'
    depends_on:
      - api
      - postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    profiles:
      - full

volumes:
  pgdata:
  miniodata:
