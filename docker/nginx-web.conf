server {
  listen 80;
  server_name localhost;

  # Security headers (SPAs: tune CSP if you add third-party scripts or non-default API origins)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  # HSTS applies once the site is served over HTTPS in production (behind TLS).
  add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:;" always;

  # Gzip compression.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1000;

  # Browser calls use VITE_API_URL=/api in the Docker image builds.
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /admin {
    return 302 /admin/;
  }

  location = /platform {
    return 302 /platform/;
  }

  location /admin/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /admin/index.html;
  }

  location /platform/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /platform/index.html;
  }

  location / {
    root /usr/share/nginx/html/tenant;
    try_files $uri $uri/ /index.html;
  }
}
