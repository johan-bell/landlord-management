# Security headers (reference for audits / local tooling). Runtime config for the web image lives in
# docker/nginx-web.conf and is installed as /etc/nginx/conf.d/default.conf in the Dockerfile.
add_header X-Content-Type-Options "nosniff" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:;" always;
add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
