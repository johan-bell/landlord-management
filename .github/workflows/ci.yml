name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            admin/package-lock.json
            tenant/package-lock.json
            platform/package-lock.json

      - name: API — install
        working-directory: api
        run: npm ci

      - name: API — Prisma generate
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/landlord
        run: npx prisma generate

      - name: API — lint
        working-directory: api
        run: npm run lint

      - name: API — Prettier check
        working-directory: api
        run: npm run format:check

      - name: API — build
        working-directory: api
        run: npm run build

      - name: API — test
        working-directory: api
        run: npm test

      - name: Admin — install, lint, format, build
        working-directory: admin
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run build

      - name: Tenant — install, lint, format, build
        working-directory: tenant
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run build

      - name: Platform — install, lint, format, build
        working-directory: platform
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t landlord-api:ci ./api

      - name: Build admin image
        run: docker build -t landlord-admin:ci ./admin

      - name: Build tenant image
        run: docker build -t landlord-tenant:ci ./tenant

      - name: Build platform image
        run: docker build -t landlord-platform:ci ./platform
