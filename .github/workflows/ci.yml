name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: landlord
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            admin/package-lock.json
            tenant/package-lock.json
            platform/package-lock.json

      - name: API — install
        working-directory: api
        run: npm ci

      - name: API — Prisma generate
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/landlord
        run: npx prisma generate

      - name: API — migrate (e2e / integration)
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/landlord
        run: npx prisma migrate deploy

      - name: API — lint
        working-directory: api
        run: npm run lint

      - name: API — Prettier check
        working-directory: api
        run: npm run format:check

      - name: API — build
        working-directory: api
        run: npm run build

      - name: API — test
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/landlord
        run: npm test

      - name: API — e2e
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/landlord
        run: npm run test:e2e

      - name: Admin — install, lint, format, build
        working-directory: admin
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run build

      - name: Tenant — install, lint, format, build
        working-directory: tenant
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run build

      - name: Platform — install, lint, format, build
        working-directory: platform
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t landlord-api:ci ./api

      - name: Build combined web image (tenant /, admin /admin/, platform /platform/)
        run: docker build -t landlord-web:ci .
