# VICE local audit: https://github.com/Webba-Creative-Technologies/vice
# Run locally: npm run security:audit
name: Security
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  # VICE reads workflow run metadata (API: GET /repos/.../actions/runs/...)
  actions: read
  contents: write
  pull-requests: write
  security-events: write

jobs:
  vice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Webba-Creative-Technologies/vice@v3
        with:
          # Raise toward 70 as findings are triaged (current local scan ~53).
          min-score: 50
